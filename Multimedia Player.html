<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia Player</title>
  </head>

  <body>
    <h1>Multimedia Player</h1>

    <section>
      <h2>Song Playing</h2>

      <audio controls aria-label="Audio song player">
        <source
          src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3"
          type="audio/mpeg"
        />
      </audio>
    </section>

    <section>
      <h2>Video Playing</h2>

      <video controls width="400" aria-label="Educational video player">
        <source
          src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
          type="video/mp4"
        />

        <track
          src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt"
          kind="subtitles"
          srclang="en"
          label="English"
        />
      </video>
    </section>

    <section>
      <h2>Transcript</h2>

      <p>
        This video explains what the JavaScript map method is and how it works
        with arrays.
      </p>
    </section>
  </body>
</html>
