<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact Form</title>
    <style>
      body {
        font-family: Tahoma;
        background-color: #1b1b32;
        margin: 0;
        padding: 20px;
      }

      .form-container {
        background-color: #2d2d44;
        border-radius: 10px;
        padding: 20px;
        width: 320px;
        margin: 0 auto;
      }

      label {
        display: block;
        margin: 6px 0 4px;
        color: #f5f6f7;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #3b3b4f;
        color: white;
        font-size: 1.1rem;
        border: none;
        cursor: pointer;
      }

      button:hover {
        background-color: #5a5a7a;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <form>
        <h2>Get in Touch</h2>

        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
