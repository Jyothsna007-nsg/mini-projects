<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>House Painting</title>
    <style>
      #house {
        position: relative;
        width: 500px;
        height: 400px;
        background-color: #f4c27a;
        border: 3px solid #000;
        margin: 50px auto;
      }

      #house > div {
        position: absolute;
      }

      #chimney {
        width: 60px;
        height: 100px;
        background-color: #8b4513;
        border: 2px solid #000;
        top: 0;
        left: 350px;
        z-index: -1;
      }

      #roof {
        width: 500px;
        height: 80px;
        background-color: #b22222;
        border: 2px solid #000;
        top: 0;
        left: 0;
      }

      #window-1 {
        width: 80px;
        height: 80px;
        background-color: #87ceeb;
        border: 2px solid #000;
        top: 120px;
        left: 80px;
      }

      #window-2 {
        width: 80px;
        height: 80px;
        background-color: #87ceeb;
        border: 2px solid #000;
        top: 120px;
        right: 80px;
      }

      #door {
        width: 100px;
        height: 150px;
        background-color: #654321;
        border: 2px solid #000;
        bottom: 0;
        left: 200px;
      }
    </style>
  </head>
  <body>
    <div id="house">
      <div id="chimney"></div>
      <div id="roof"></div>
      <div id="window-1"></div>
      <div id="window-2"></div>
      <div id="door"></div>
    </div>
  </body>
</html>
