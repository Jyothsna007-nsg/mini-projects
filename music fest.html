<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Event Flyer</title>
    <style>
      body {
        padding: 50px 0;
        margin: 0 auto;
        width: 80vw;
        min-height: calc(100vh - 100px);
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
      }

      header {
        text-align: center;
      }

      header img {
        width: 100%;
      }

      section {
        width: 90%;
        margin: 20px auto;
        padding: 10px;
        background: white;
        border-radius: 8px;
      }

      hr {
        width: 80%;
      }
    </style>
  </head>

  <body>
    <header>
      <img
        src="https://cdn.freecodecamp.org/curriculum/labs/event.jpg"
        alt="Event celebration image"
      />
      <h1>Summer Music Fest 2026</h1>
    </header>

    <main>
      <section>
        <h2>Live Concerts</h2>
        <p>Enjoy performances from top artists across multiple genres.</p>
      </section>

      <hr />

      <section>
        <h2>Food & Fun</h2>
        <p>Explore delicious food stalls and exciting activities.</p>
      </section>
    </main>
  </body>
</html>
