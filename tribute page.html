<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tribute Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
      }

      #image {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0 auto;
      }

      #img-div {
        margin: 20px auto;
      }

      #tribute-info {
        margin: 20px auto;
        max-width: 600px;
      }

      #tribute-link {
        display: inline-block;
        margin-top: 10px;
        color: blue;
      }
    </style>
  </head>

  <body>
    <main id="main">
      <h1 id="title">Dr. A.P.J. Abdul Kalam</h1>

      <figure id="img-div">
        <img
          id="image"
          src="https://upload.wikimedia.org/wikipedia/commons/b/b0/A._P._J._Abdul_Kalam_in_2008.jpg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original"
          width="300"
          height="300"
          alt="A.P.J. Abdul Kalam"
        />
        <figcaption id="img-caption">
          Dr. A.P.J. Abdul Kalam, the Missile Man of India.
        </figcaption>
      </figure>

      <section id="tribute-info">
        <p>
          Dr. A.P.J. Abdul Kalam was an Indian aerospace scientist and the 11th
          President of India. He played a key role in India's space and missile
          programs.
        </p>
      </section>

      <a
        id="tribute-link"
        href="https://en.wikipedia.org/wiki/A._P._J._Abdul_Kalam"
        target="_blank"
      >
        Learn more about Dr. Kalam
      </a>
    </main>
  </body>
</html>
