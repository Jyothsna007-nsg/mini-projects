<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Inventory</title>
    <style>
      /* ALL spans */
      span {
        display: inline-block;
      }

      /* ROW STYLES (ATTRIBUTE SELECTORS - REQUIRED) */
      tr[class="read"] {
        background-image: linear-gradient(#d4f5d4, #a8e6a3);
      }

      tr[class="to-read"] {
        background-image: linear-gradient(#fff3cd, #ffe08a);
      }

      tr[class="in-progress"] {
        background-image: linear-gradient(#cce5ff, #80bdff);
      }

      /* STATUS + RATE COMBINED RULE (IMPORTANT FIX) */
      span[class="status"],
      span[class^="rate"] {
        height: 1.2rem;
        width: 6rem;
        padding: 0.2rem;
      }

      /* STATUS styling per row */
      tr[class="read"] span[class="status"] {
        border: 1px solid #333;
        background-image: linear-gradient(#a8e6a3, #d4f5d4);
      }

      tr[class="to-read"] span[class="status"] {
        border: 1px solid #333;
        background-image: linear-gradient(#ffe08a, #fff3cd);
      }

      tr[class="in-progress"] span[class="status"] {
        border: 1px solid #333;
        background-image: linear-gradient(#80bdff, #cce5ff);
      }

      /* RATE container */
      span[class^="rate"] > span {
        border: 1px solid #333;
        border-radius: 3px;
        margin: 0 2px;
        height: 0.6rem;
        width: 0.6rem;
        background-color: #ddd;
      }

      /* RATE fills */

      /* ONE */
      span[class~="one"] > span:first-child {
        background-image: linear-gradient(gold, orange);
      }

      /* TWO */
      span[class~="two"] > span:nth-of-type(-n + 2) {
        background-image: linear-gradient(gold, orange);
      }

      /* THREE */
      span[class~="three"] > span {
        background-image: linear-gradient(gold, orange);
      }
    </style>
  </head>
  <body>
    <h1>Book Inventory</h1>

    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Status</th>
          <th>Rate</th>
        </tr>
      </thead>

      <tbody>
        <tr class="read">
          <td>Book A</td>
          <td>Author A</td>
          <td>Fiction</td>
          <td><span class="status">Read</span></td>
          <td>
            <span class="rate one"
              ><span></span><span></span><span></span
            ></span>
          </td>
        </tr>

        <tr class="to-read">
          <td>Book B</td>
          <td>Author B</td>
          <td>Science</td>
          <td><span class="status">To Read</span></td>
          <td>
            <span class="rate two"
              ><span></span><span></span><span></span
            ></span>
          </td>
        </tr>

        <tr class="in-progress">
          <td>Book C</td>
          <td>Author C</td>
          <td>History</td>
          <td><span class="status">In Progress</span></td>
          <td>
            <span class="rate three"
              ><span></span><span></span><span></span
            ></span>
          </td>
        </tr>

        <tr class="read">
          <td>Book D</td>
          <td>Author D</td>
          <td>Drama</td>
          <td><span class="status">Read</span></td>
          <td>
            <span class="rate two"
              ><span></span><span></span><span></span
            ></span>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
