<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Business Card</title>
    <style>
      body {
        background-color: rosybrown;
        font-family: Arial, sans-serif;
      }

      .business-card {
        width: 300px;
        background-color: white;
        padding: 20px;
        margin-top: 100px;
        margin-left: auto;
        margin-right: auto;
        text-align: center;
        font-size: 16px;
      }

      .profile-image {
        max-width: 100%;
      }

      p {
        margin: 5px 0;
      }

      a {
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="business-card">
      <img
        class="profile-image"
        src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg"
        alt="Profile flower avatar"
      />

      <p class="full-name">Jyothsna Ithagoni</p>
      <p class="designation">Frontend Developer</p>
      <p class="company">TechBloom Solutions</p>

      <hr />

      <p>jyothsna@email.com</p>
      <p>+91 9876543210</p>

      <a class="portfolio-link" href="https://example.com">Portfolio</a>

      <hr />

      <div class="social-media">
        <h2>Connect with me</h2>

        <a href="https://twitter.com">Twitter</a>
        <a href="https://linkedin.com">LinkedIn</a>
        <a href="https://github.com">GitHub</a>
      </div>
    </div>
  </body>
</html>
