<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing Cards</title>
    <style>
      #playing-cards {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
      }

      .card {
        width: 150px;
        height: 220px;
        border: 2px solid black;
        border-radius: 10px;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        flex-direction: column;
        font-size: 24px;
      }

      .left {
        align-self: flex-start;
      }

      .middle {
        align-self: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 40px;
      }

      .right {
        align-self: flex-end;
      }
    </style>
  </head>
  <body>
    <main id="playing-cards">
      <div class="card">
        <div class="left">♠ A</div>

        <div class="middle">
          <span>♠</span>
          <span>A</span>
        </div>

        <div class="right">♠ A</div>
      </div>

      <div class="card">
        <div class="left">♥ K</div>

        <div class="middle">
          <span>♥</span>
          <span>K</span>
        </div>

        <div class="right">♥ K</div>
      </div>

      <div class="card">
        <div class="left">♦ Q</div>

        <div class="middle">
          <span>♦</span>
          <span>Q</span>
        </div>

        <div class="right">♦ Q</div>
      </div>
    </main>
  </body>
</html>
